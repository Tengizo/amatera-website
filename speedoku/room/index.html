<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Invited — Speedoku Battle</title>
    <meta name="description" content="Someone challenged you to a real-time Sudoku battle on Speedoku. Download the app to join the game.">

    <!-- iOS Smart App Banner -->
    <meta name="apple-itunes-app" content="app-id=6758058137">

    <!-- Open Graph -->
    <meta property="og:title" content="You're invited to a Sudoku battle!">
    <meta property="og:description" content="Someone challenged you to a real-time multiplayer Sudoku match on Speedoku. Tap to join.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://speedoku.amatera.dev/assets/og-image.png">
    <meta property="og:url" content="https://speedoku.amatera.dev/room/">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="You're invited to a Sudoku battle!">
    <meta name="twitter:description" content="Someone challenged you to a real-time multiplayer Sudoku match on Speedoku. Tap to join.">
    <meta name="twitter:image" content="https://speedoku.amatera.dev/assets/og-image.png">
    <link rel="canonical" href="https://speedoku.amatera.dev/room/">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/icon.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { scroll-padding-top: 100px; }

        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #8B5CF6;
            color: #fff;
            padding: 8px 16px;
            z-index: 200;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 0 0 8px 0;
            transition: top 0.2s;
        }

        .skip-link:focus {
            top: 0;
        }

        :root {
            --bg-deep: #0D0515;
            --bg-dark: #1A0A2E;
            --bg-card: #251440;
            --primary: #8B5CF6;
            --primary-glow: #A78BFA;
            --primary-dim: #6D28D9;
            --accent: #D580FF;
            --text-primary: #FFFFFF;
            --text-secondary: #B4A5C7;
            --text-muted: #9585AD;
        }

        html, body {
            height: 100%;
        }

        @font-face {
            font-family: 'Inter Fallback';
            src: local('Arial');
            size-adjust: 107%;
            ascent-override: 90%;
            descent-override: 22%;
            line-gap-override: 0%;
        }

        body {
            font-family: 'Inter', 'Inter Fallback', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* ── Animated grid background ── */
        .bg-grid {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        /* Faint 9x9 grid lines */
        .bg-grid::before {
            content: '';
            position: absolute;
            inset: -50%;
            width: 200%;
            height: 200%;
            background-image:
                linear-gradient(rgba(139, 92, 246, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridDrift 30s linear infinite;
        }

        /* Thicker 3x3 box lines */
        .bg-grid::after {
            content: '';
            position: absolute;
            inset: -50%;
            width: 200%;
            height: 200%;
            background-image:
                linear-gradient(rgba(139, 92, 246, 0.07) 1.5px, transparent 1.5px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.07) 1.5px, transparent 1.5px);
            background-size: 180px 180px;
            animation: gridDrift 30s linear infinite;
        }

        @keyframes gridDrift {
            0%   { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        /* Floating digits */
        .floating-digit {
            position: fixed;
            font-size: 100px;
            font-weight: 800;
            color: rgba(139, 92, 246, 0.03);
            animation: digitFloat 22s ease-in-out infinite;
            user-select: none;
            pointer-events: none;
            z-index: 0;
        }

        .floating-digit:nth-child(1) { top: 8%;  left: 6%;  animation-delay: 0s; }
        .floating-digit:nth-child(2) { top: 55%; left: 12%; animation-delay: -4s; }
        .floating-digit:nth-child(3) { top: 25%; right: 8%; animation-delay: -9s; }
        .floating-digit:nth-child(4) { top: 72%; right: 15%; animation-delay: -14s; }
        .floating-digit:nth-child(5) { top: 15%; left: 42%; animation-delay: -6s; }
        .floating-digit:nth-child(6) { top: 82%; left: 55%; animation-delay: -11s; }

        @keyframes digitFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.03; }
            50%      { transform: translateY(-25px) rotate(4deg); opacity: 0.06; }
        }

        /* Radial glow behind the card */
        .glow-orb {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
            animation: orbPulse 6s ease-in-out infinite;
        }

        @keyframes orbPulse {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            50%      { opacity: 1;   transform: translate(-50%, -50%) scale(1.15); }
        }

        /* ── Main content ── */
        .invite-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 24px;
            max-width: 480px;
            width: 100%;
            animation: fadeInUp 0.8s ease-out both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease-out 0.1s both;
        }

        .logo-img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
        }

        .logo-text {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: var(--primary);
        }

        /* Invite card */
        .invite-card {
            width: 100%;
            background: linear-gradient(145deg, var(--bg-card) 0%, rgba(37, 20, 64, 0.6) 100%);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 24px;
            padding: 44px 32px;
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        /* Shimmer border effect */
        .invite-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 24px;
            padding: 1.5px;
            background: linear-gradient(
                135deg,
                transparent 30%,
                rgba(139, 92, 246, 0.5) 50%,
                transparent 70%
            );
            background-size: 200% 200%;
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: shimmer 4s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Swords icon */
        .invite-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 24px;
            background: rgba(139, 92, 246, 0.12);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: iconPop 0.6s ease-out 0.5s both;
        }

        @keyframes iconPop {
            from { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            to   { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        .invite-icon svg {
            width: 36px;
            height: 36px;
            color: var(--primary-glow);
        }

        .invite-heading {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            line-height: 1.2;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--primary-glow) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .invite-subtext {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 36px;
            line-height: 1.6;
        }

        /* Divider */
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            margin: 0 auto 28px;
            border-radius: 2px;
        }

        .download-label {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* Store buttons — matching landing page exactly */
        .store-buttons {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .store-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 10px 24px 10px 18px;
            background: #000000;
            border: 1.5px solid #a6a6a6;
            border-radius: 12px;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.3s;
        }

        .store-btn:hover {
            background: #1a1a1a;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .store-btn svg {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
        }

        .store-btn-text {
            text-align: left;
        }

        .store-btn-text span {
            display: block;
            font-size: 11px;
            color: #cccccc;
            letter-spacing: 0.02em;
            line-height: 1.2;
        }

        .store-btn-text strong {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.01em;
            line-height: 1.3;
        }

        /* Footer */
        .footer-note {
            margin-top: 40px;
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .footer-note a {
            color: var(--primary-glow);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-note a:hover {
            color: var(--accent);
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .invite-card {
                padding: 36px 24px;
            }

            .invite-heading {
                font-size: 24px;
            }

            .store-buttons {
                flex-direction: column;
                align-items: center;
            }

            .store-btn {
                width: 100%;
                max-width: 260px;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <!-- Background layers -->
    <div class="bg-grid"></div>
    <span class="floating-digit">9</span>
    <span class="floating-digit">3</span>
    <span class="floating-digit">7</span>
    <span class="floating-digit">1</span>
    <span class="floating-digit">5</span>
    <span class="floating-digit">8</span>
    <div class="glow-orb"></div>

    <!-- Content -->
    <div id="main-content" class="invite-wrapper">
        <a href="https://speedoku.amatera.dev/" class="logo">
            <img src="../assets/icon.png" alt="Speedoku" class="logo-img">
            <span class="logo-text">Speed<span>oku</span></span>
        </a>

        <div class="invite-card">
            <div class="invite-icon">
                <!-- Crossed swords icon -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.5 17.5L3 6V3h3l11.5 11.5"/>
                    <path d="M13 19l6-6"/>
                    <path d="M16 16l4 4"/>
                    <path d="M19 21l2-2"/>
                    <path d="M9.5 6.5L21 18v3h-3L6.5 9.5"/>

                    <path d="M8 8L4 4"/>

                </svg>
            </div>

            <h1 class="invite-heading">You've been invited to<br>a Sudoku battle!</h1>
            <p class="invite-subtext">A friend is waiting for you in a Speedoku multiplayer room. Download the app to join the match.</p>

            <div class="divider"></div>
            <p class="download-label">Get the free app</p>

            <div class="store-buttons">
                <a href="https://apps.apple.com/us/app/speedoku-multiplayer-sudoku/id6758058137" target="_blank" rel="noopener noreferrer" class="store-btn">

                    </svg>
                    <div class="store-btn-text">
                        <span>Download on the</span>
                        <strong>App Store</strong>
                    </div>
                </a>
                <a href="https://play.google.com/store/apps/details?id=com.speedoku.speedoku" target="_blank" rel="noopener noreferrer" class="store-btn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3.61 1.814L13.793 12 3.61 22.186a.996.996 0 0 1-.61-.92V2.734a1 1 0 0 1 .61-.92z"/>
                        <path d="M14.5 12.707l2.55 2.55-8.6 4.87 6.05-7.42z" fill="#34A853"/>
                        <path d="M19.05 10.57l-2.01 1.14-2.54-2.71 2.54-2.71 2.01 1.14c.87.49.87 1.71 0 2.14z" fill="#FBBC04"/>
                        <path d="M8.45 4.873l8.6 4.87-2.55 2.55-6.05-7.42z" fill="#EA4335"/>
                    </svg>
                    <div class="store-btn-text">
                        <span>GET IT ON</span>
                        <strong>Google Play</strong>
                    </div>
                </a>
            </div>
        </div>

        <p class="footer-note">
            <a href="https://speedoku.amatera.dev/">Learn more about Speedoku</a>
        </p>
    </div>
</body>
</html>
